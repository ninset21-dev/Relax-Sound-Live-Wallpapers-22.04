<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#1d5c42"/>
      <stop offset="55%" stop-color="#0d2a1d"/>
      <stop offset="100%" stop-color="#061309"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bf3ae"/>
      <stop offset="100%" stop-color="#0d8356"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d2ffec" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#d2ffec" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- sound waves -->
  <g fill="none" stroke="#2bf3ae" stroke-width="10" stroke-linecap="round" opacity="0.35">
    <path d="M180 770 Q 330 620 512 620 T 844 770"/>
    <path d="M220 830 Q 360 700 512 700 T 804 830" opacity="0.6"/>
    <path d="M260 890 Q 390 790 512 790 T 764 890" opacity="0.4"/>
  </g>
  <!-- leaf -->
  <g transform="translate(512 470)">
    <path d="M -240 40 C -240 -180 -60 -320 160 -260 C 300 -220 340 -80 240 80 C 120 260 -120 280 -220 180 C -250 150 -260 90 -240 40 Z" fill="url(#leaf)"/>
    <path d="M -220 60 C -150 -20 -50 -60 80 -40" stroke="#d2ffec" stroke-width="6" fill="none" opacity="0.6"/>
    <path d="M -160 80 C -90 40 10 10 120 0" stroke="#d2ffec" stroke-width="4" fill="none" opacity="0.45"/>
    <path d="M -90 110 C -30 80 60 60 160 40" stroke="#d2ffec" stroke-width="3" fill="none" opacity="0.35"/>
  </g>
  <!-- dew drop -->
  <g transform="translate(620 340)">
    <path d="M 0 -70 C 40 -20 60 10 60 40 C 60 80 30 110 0 110 C -30 110 -60 80 -60 40 C -60 10 -40 -20 0 -70 Z" fill="#d2ffec" opacity="0.85"/>
    <ellipse cx="-18" cy="30" rx="10" ry="18" fill="#ffffff" opacity="0.85"/>
  </g>
  <!-- sparks / fireflies -->
  <g fill="#d2ffec">
    <circle cx="220" cy="240" r="6" opacity="0.9"/>
    <circle cx="320" cy="180" r="4" opacity="0.7"/>
    <circle cx="780" cy="220" r="7" opacity="0.9"/>
    <circle cx="860" cy="320" r="4" opacity="0.7"/>
    <circle cx="180" cy="460" r="3" opacity="0.6"/>
    <circle cx="840" cy="540" r="5" opacity="0.8"/>
  </g>
  <!-- soft glow -->
  <circle cx="512" cy="450" r="360" fill="url(#glow)" opacity="0.08"/>
</svg>
